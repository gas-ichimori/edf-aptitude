<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDF適正診断</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #3d6b2a;
  --dark: #0a1208;
  --gold: #c8a832;
  --text: #e8f0e0;
}

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
}

/* ---- 背景スキャンライン ---- */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.15) 3px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative;
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 1;
}

/* ---- ヘッダー ---- */
#header {
  width: 100%;
  text-align: center;
  padding: 10px 0 4px;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold);
  opacity: 0.8;
}

/* ---- キャラクターエリア ---- */
#character-area {
  position: relative;
  flex: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  width: 100%;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

#character-svg {
  height: 70dvh;
  max-height: 500px;
  width: auto;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.8));
  transform-origin: bottom center;
  animation: idle-breathe 3.5s ease-in-out infinite;
}

@keyframes idle-breathe {
  0%, 100% { transform: scaleY(1) translateY(0); }
  50%       { transform: scaleY(1.012) translateY(-4px); }
}

#character-svg.touched {
  animation: bounce 0.4s ease;
}

@keyframes bounce {
  0%   { transform: translateY(0); }
  30%  { transform: translateY(-18px) rotate(-2deg); }
  60%  { transform: translateY(-6px) rotate(1deg); }
  100% { transform: translateY(0) rotate(0); }
}

/* ---- まばたきアニメ ---- */
.eyelid { animation: blink 4s ease-in-out infinite; transform-origin: top center; transform-box: fill-box; }
.eyelid-r { animation: blink 4s ease-in-out infinite 0.05s; transform-origin: top center; transform-box: fill-box; }
@keyframes blink {
  0%, 40%, 50%, 100% { transform: scaleY(0); }
  45%                { transform: scaleY(1); }
}

/* 口パク */
.mouth-open { display: none; }
.talking .mouth-closed { display: none; }
.talking .mouth-open   { display: block; }

/* ---- 吹き出し ---- */
#speech-bubble {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 30, 10, 0.92);
  border: 2px solid var(--gold);
  border-radius: 14px;
  padding: 12px 18px;
  max-width: 300px;
  font-size: 14px;
  line-height: 1.6;
  text-align: center;
  color: #dff0d0;
  display: none;
  z-index: 20;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
}
#speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: var(--gold);
}
#speech-bubble.show { display: block; }

/* ---- タップ促進 ---- */
#tap-hint {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--gold);
  animation: pulse-hint 1.6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes pulse-hint { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ---- 質問パネル ---- */
#question-panel {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  z-index: 30;
  background: rgba(5, 14, 5, 0.75);
  backdrop-filter: blur(6px);
}
#question-panel.show { display: flex; }

#q-progress {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 12px;
}

#q-text {
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  line-height: 1.5;
  margin-bottom: 24px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

#answers {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 360px;
}

.answer-btn {
  width: 100%;
  padding: 14px 18px;
  background: rgba(30, 60, 20, 0.85);
  border: 1.5px solid rgba(100, 180, 60, 0.4);
  border-radius: 12px;
  color: #dff0d0;
  font-size: 15px;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.answer-btn:active {
  background: rgba(60, 120, 30, 0.9);
  border-color: var(--gold);
  transform: scale(0.97);
}

/* ---- 結果パネル ---- */
#result-panel {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  z-index: 50;
  text-align: center;
  transition: background 1s;
}
#result-panel.show { display: flex; }

#result-icon { font-size: 72px; margin-bottom: 12px; animation: result-pop 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes result-pop { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1) rotate(0)} }

#result-class-en {
  font-size: 12px;
  letter-spacing: 5px;
  opacity: 0.7;
  margin-bottom: 4px;
}
#result-class-jp {
  font-size: 46px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 16px;
  text-shadow: 0 0 30px currentColor;
}
#result-badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 6px;
  padding: 4px 16px;
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 20px;
  color: var(--gold);
}
#result-desc {
  font-size: 14px;
  line-height: 1.8;
  max-width: 320px;
  opacity: 0.8;
  white-space: pre-line;
  margin-bottom: 28px;
}
#retry-btn {
  padding: 14px 40px;
  background: transparent;
  border: 2px solid var(--gold);
  border-radius: 40px;
  color: var(--gold);
  font-size: 16px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 2px;
  transition: background 0.2s;
}
#retry-btn:active { background: rgba(200, 168, 50, 0.2); }

/* ---- 診断中 ---- */
#calculating {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  background: rgba(5,14,5,0.95);
  z-index: 40;
  font-size: 18px;
  letter-spacing: 3px;
  color: var(--gold);
}
#calculating.show { display: flex; }
.dots { animation: dot-blink 1.2s steps(4, end) infinite; }
@keyframes dot-blink { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
</style>
</head>

  },
};

// ===================== ゲーム状態 =====================
let state = 'idle'; // idle | intro | question | reaction | calculating | result
let introIdx = 0;
let qIdx = 0;
let scores = { ranger: 0, winger: 0, raider: 0, fencer: 0 };
let isTalking = false;
let talkTimer = null;

// ===================== 要素取得 =====================
const charSvg      = document.getElementById('character-svg');
const speechBubble = document.getElementById('speech-bubble');
const tapHint      = document.getElementById('tap-hint');
const qPanel       = document.getElementById('question-panel');
const qNum         = document.getElementById('q-num');
const qText        = document.getElementById('q-text');
const answersDiv   = document.getElementById('answers');
const calcDiv      = document.getElementById('calculating');
const resultPanel  = document.getElementById('result-panel');

// ===================== 音声 =====================
function speak(text, onEnd) {
  const synth = window.speechSynthesis;
  if (!synth) { onEnd?.(); return; }
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.95;
  utter.pitch = 0.9;
  utter.onend = () => { stopTalking(); onEnd?.(); };
  utter.onerror = () => { stopTalking(); onEnd?.(); };
  startTalking();
  synth.speak(utter);
}

function startTalking() {
  isTalking = true;
  charSvg.classList.add('talking');
  clearInterval(talkTimer);
  talkTimer = setInterval(() => {
    const open = charSvg.classList.contains('talking');
    charSvg.classList.toggle('mouth-toggle', open);
  }, 160);
}

function stopTalking() {
  isTalking = false;
  charSvg.classList.remove('talking');
  clearInterval(talkTimer);
}

// ===================== 吹き出し =====================
function showBubble(text) {
  speechBubble.textContent = text;
  speechBubble.classList.add('show');
}

function hideBubble() {
  speechBubble.classList.remove('show');
}

// ===================== キャラタップ処理 =====================
function onCharacterTap() {
  if (state === 'idle') {
    startIntro();
  } else if (state === 'intro') {
    window.speechSynthesis?.cancel();
    stopTalking();
    introIdx++;
    if (introIdx >= INTRO_LINES.length) {
      startQuestions();
    } else {
      showIntroLine();
    }
  }
  // question/reaction/result 中はボタンで操作
}

// ===================== イントロ =====================
function startIntro() {
  state = 'intro';
  introIdx = 0;
  tapHint.style.display = 'none';
  showIntroLine();
}

function showIntroLine() {
  const line = INTRO_LINES[introIdx];
  showBubble(line + '\n\n（タップで次へ）');
  speak(line, () => {});
}

// ===================== 質問 =====================
function startQuestions() {
  state = 'question';
  hideBubble();
  qIdx = 0;
  scores = { ranger: 0, winger: 0, raider: 0, fencer: 0 };
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[qIdx];
  qNum.textContent = qIdx + 1;
  qText.textContent = q.q;
  answersDiv.innerHTML = '';
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = ans.text;
    btn.onclick = () => selectAnswer(i);
    answersDiv.appendChild(btn);
  });
  qPanel.classList.add('show');

  // キャラが質問を読み上げ
  speak(q.q, () => {});
}

function selectAnswer(i) {
  if (state !== 'question') return;
  state = 'reaction';

  // ボタン無効化
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  // スコア加算
  const s = QUESTIONS[qIdx].a[i].s;
  Object.entries(s).forEach(([k, v]) => { scores[k] += v; });

  // キャラ反応
  const reaction = REACTIONS[qIdx][i];
  qPanel.classList.remove('show');
  showBubble(reaction);
  speak(reaction, () => {
    hideBubble();
    qIdx++;
    if (qIdx >= QUESTIONS.length) {
      showCalculating();
    } else {
      state = 'question';
      showQuestion();
    }
  });

  // タッチバウンス
  charSvg.classList.add('touched');
  setTimeout(() => charSvg.classList.remove('touched'), 500);
}

// ===================== 診断中 =====================
function showCalculating() {
  state = 'calculating';
  calcDiv.classList.add('show');
  speak('診断中だ...', () => {});
  setTimeout(showResult, 2200);
}

// ===================== 結果 =====================
function showResult() {
  calcDiv.classList.remove('show');
  const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const r = RESULTS[best];

  resultPanel.style.background = r.bg;
  document.getElementById('result-icon').textContent     = r.icon;
  document.getElementById('result-class-en').textContent = r.en;
  document.getElementById('result-class-jp').textContent = r.title;
  document.getElementById('result-class-jp').style.color = r.color;
  document.getElementById('result-desc').textContent     = r.desc;

  resultPanel.classList.add('show');
  state = 'result';
  setTimeout(() => speak(r.speech, () => {}), 800);
}

// ===================== リトライ =====================
function restart() {
  window.speechSynthesis?.cancel();
  stopTalking();
  resultPanel.classList.remove('show');
  hideBubble();
  tapHint.style.display = '';
  introIdx = 0;
  qIdx = 0;
  state = 'idle';
}
</script>
</body>
</html>
