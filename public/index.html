<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDF適正診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c8a832; --text: #e8f0e0; }

body {
  background: url('/bg.jpg') center center / cover no-repeat fixed;
  color: var(--text);
  font-family: 'M PLUS 1p', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  font-weight: 800;
  height: 100dvh; overflow: hidden; user-select: none;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.42),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
  pointer-events: none; z-index: 0;
}

#pixi-canvas {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
}

/* キャラタップ領域（アイドル時のみ反応） */
#char-tap {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 60%; height: 80%;
  z-index: 5; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

#header {
  position: fixed; top: 0; left: 0; right: 0;
  text-align: center; padding: 12px 0;
  font-size: 11px; letter-spacing: 4px; color: var(--gold);
  z-index: 20; text-shadow: 0 0 10px rgba(200,168,50,0.4);
}

/* 吹き出し（お腹あたり・しっぽ上向き） */
#speech-bubble {
  position: fixed;
  top: 58%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(3,12,3,0.15);
  border: 1px solid rgba(200,168,50,0.3); border-radius: 14px;
  padding: 14px 20px; max-width: 320px; width: 90%;
  font-size: 15px; line-height: 1.75; text-align: center;
  color: #dff0d0; white-space: pre-line;
  display: none; z-index: 30;
  backdrop-filter: blur(3px);
  box-shadow: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
/* しっぽを上向きに */
#speech-bubble::after {
  content: ''; position: absolute;
  top: -14px; left: 50%; transform: translateX(-50%);
  border: 7px solid transparent; border-bottom-color: var(--gold);
}
#speech-bubble.show { display: block; }

/* 「タップで次へ」ヒント */
#speech-tap-next {
  display: none;
  text-align: right;
  margin-top: 10px;
  font-size: 12px;
  color: #88ff55;
  letter-spacing: 0.5px;
  font-weight: 600;
  background: transparent;
  border: none;
}

#tap-hint {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  font-size: 15px; letter-spacing: 3px; color: var(--gold);
  z-index: 20; pointer-events: none;
  animation: hint-pulse 1.6s ease-in-out infinite;
  text-shadow: 0 0 12px rgba(200,168,50,0.5);
}
@keyframes hint-pulse { 0%,100%{opacity:0.25} 50%{opacity:1} }

/* 質問パネル */
#question-panel {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px; z-index: 30;
  background: rgba(2,8,2,0.78); backdrop-filter: blur(10px);
}
#question-panel[hidden] { display: none; }

#q-progress { font-size: 11px; letter-spacing: 3px; color: var(--gold); margin-bottom: 8px; }
#q-bar {
  width: 220px; height: 3px;
  background: rgba(200,168,50,0.18); border-radius: 2px; margin-bottom: 22px;
}
#q-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
#q-text {
  font-size: 19px; font-weight: bold;
  text-align: center; line-height: 1.55;
  margin-bottom: 26px; color: #fff; max-width: 340px;
  text-shadow: 0 2px 12px rgba(0,0,0,1);
}
#answers { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 360px; }
.answer-btn {
  width: 100%; padding: 15px 18px;
  background: rgba(18,45,12,0.88);
  border: 1.5px solid rgba(100,180,60,0.3); border-radius: 10px;
  color: #dff0d0; font-size: 15px; font-family: inherit;
  text-align: left; cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.12s, border-color 0.12s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.answer-btn:active {
  background: rgba(50,110,28,0.95); border-color: var(--gold); transform: scale(0.97);
}

/* 診断中 */
#calculating {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 22px;
  background: rgba(2,8,2,0.96); z-index: 40;
  font-size: 18px; letter-spacing: 3px; color: var(--gold);
}
#calculating[hidden] { display: none; }
.dot-anim::after {
  content: ''; animation: dots 1.5s steps(4,end) infinite;
}
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} 100%{content:''} }

/* 結果 */
#result-panel {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; z-index: 50; text-align: center;
}
#result-panel[hidden] { display: none; }

#result-icon { font-size: 70px; margin-bottom: 10px; animation: rpop 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes rpop { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1)} }
#result-class-en { font-size: 12px; letter-spacing: 5px; opacity: 0.6; margin-bottom: 4px; }
#result-class-jp { font-size: 44px; font-weight: 900; letter-spacing: 2px; margin-bottom: 14px; text-shadow: 0 0 30px currentColor; }
#result-badge {
  display: inline-block;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 6px; padding: 4px 16px;
  font-size: 12px; letter-spacing: 2px; margin-bottom: 18px; color: var(--gold);
}
#result-desc { font-size: 14px; line-height: 1.9; max-width: 320px; opacity: 0.85; white-space: pre-line; margin-bottom: 28px; }
#retry-btn {
  padding: 14px 40px; background: transparent;
  border: 2px solid var(--gold); border-radius: 40px;
  color: var(--gold); font-size: 15px; font-family: inherit;
  cursor: pointer; letter-spacing: 2px;
  -webkit-tap-highlight-color: transparent;
}
#retry-btn:active { background: rgba(200,168,50,0.15); }
</style>
</head>
<body>

<div id="header">— EARTH DEFENSE FORCE —</div>
<canvas id="pixi-canvas"></canvas>
<div id="char-tap" onclick="onCharacterTap()"></div>

<div id="speech-bubble" onclick="onSpeechBubbleTap(event)">
  <div id="speech-text"></div>
  <div id="speech-tap-next">タップで次へ ▶</div>
</div>
<div id="tap-hint">▼ タップして開始 ▼</div>

<div id="question-panel" hidden>
  <div id="q-progress">Q<span id="q-num">1</span> / 5</div>
  <div id="q-bar"><div id="q-bar-fill" style="width:0%"></div></div>
  <div id="q-text"></div>
  <div id="answers"></div>
</div>

<div id="calculating" hidden>
  <div style="font-size:44px">⚙️</div>
  <div>診断中<span class="dot-anim"></span></div>
</div>

<div id="result-panel" hidden>
  <div id="result-icon"></div>
  <div id="result-class-en"></div>
  <div id="result-class-jp"></div>
  <div id="result-badge">EDF APTITUDE CERTIFIED</div>
  <div id="result-desc"></div>
  <button id="retry-btn" onclick="restart()">もう一度診断する</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ===================== PixiJS =====================
const pixiApp = new PIXI.Application({
  view: document.getElementById('pixi-canvas'),
  resizeTo: window,
  backgroundAlpha: 0,
  antialias: true,
  resolution: Math.min(window.devicePixelRatio || 1, 2),
  autoDensity: true,
});

let sprite = null, baseScale = 1, baseY = 0;
let animT = 0, glowT = 0;
let talking = false, glowing = false;

PIXI.Assets.load('/character.png').then(tex => {
  sprite = new PIXI.Sprite(tex);
  sprite.anchor.set(0.5, 1.0);

  const fit = () => {
    const scale = (window.innerHeight * 0.84) / tex.height;
    baseScale = scale;
    sprite.x = pixiApp.screen.width / 2;
    sprite.y = pixiApp.screen.height * 0.97;
    baseY = sprite.y;
  };
  fit();
  window.addEventListener('resize', fit);

  pixiApp.stage.addChild(sprite);
  pixiApp.ticker.add(tick);
});

function tick(delta) {
  if (!sprite) return;
  animT += delta * 0.016;

  const breathe = Math.sin(animT * 1.25) * 0.011;
  const sway    = Math.sin(animT * 0.73) * 0.013;
  const float_  = Math.sin(animT * 1.05) * 3.2;
  const micro   = Math.sin(animT * 2.40) * 0.003;

  let sx = baseScale * (1 - breathe * 0.25 + micro);
  let sy = baseScale * (1 + breathe - micro);
  let rot = sway;
  let py = baseY + float_;

  if (glowing) {
    glowT += delta * 0.016;
    const g = Math.sin(glowT * 2.8) * 0.5 + 0.5;
    const r = 1, gr = 1 - g * 0.25, b = 1 - g * 0.15;
    sprite.tint = PIXI.utils.rgb2hex([r, gr, b]);
  }

  sprite.scale.x = sx;
  sprite.scale.y = sy;
  sprite.rotation = rot;
  sprite.y = py;
}

const charAnim = {
  startTalk() { talking = true; },
  stopTalk()  { talking = false; },
  glow(on)    { glowing = on; glowT = 0; if (!on && sprite) sprite.tint = 0xffffff; },
};

// ===================== データ =====================
const QUESTIONS = [
  { q: '戦場でのあなたのスタイルは？', a: [
    { text: '🔫 最前線で敵を直接撃破！',     s: {ranger:3} },
    { text: '⚡ 空から高速で急襲！',          s: {winger:3} },
    { text: '📡 援軍・爆撃で戦局を操る！',   s: {raider:3} },
    { text: '⚙️ 重装甲で仲間を守り抜く！',  s: {fencer:3} },
  ]},
  { q: 'あなたの最大の強みは？', a: [
    { text: '💪 体力と精神力なら負けない！', s: {ranger:2, fencer:1} },
    { text: '🚀 俊敏さと機動力が自慢！',     s: {winger:3} },
    { text: '🧠 分析力と戦略眼は超一流！',  s: {raider:3} },
    { text: '🛡️ どんな攻撃も耐え抜く精神！',s: {fencer:3} },
  ]},
  { q: '好きな装備・兵器は？', a: [
    { text: '🎯 ライフルとロケットランチャー', s: {ranger:3} },
    { text: '⚡ プラズマ兵器とジェットパック', s: {winger:3} },
    { text: '💣 爆撃要請とビークル召喚',      s: {raider:3} },
    { text: '🔩 重装甲と大型ブースター',       s: {fencer:3} },
  ]},
  { q: '仲間がピンチ！あなたはどうする？', a: [
    { text: '🏃 すぐに駆けつけて戦う！',      s: {ranger:3} },
    { text: '🛩️ 上空から援護射撃！',          s: {winger:2, raider:1} },
    { text: '📻 増援を呼んで包囲殲滅！',      s: {raider:3} },
    { text: '🛡️ 盾になって仲間を守る！',      s: {fencer:3} },
  ]},
  { q: 'EDF入隊の動機は？', a: [
    { text: '🌍 地球を守りたい！',             s: {ranger:2, winger:1} },
    { text: '✈️ 空を自由に飛びたかった！',     s: {winger:3} },
    { text: '🎯 最高の作戦で勝利したい！',     s: {raider:3} },
    { text: '💥 最強の装備を纏いたい！',       s: {fencer:3} },
  ]},
];

const REACTIONS = [
  ['突撃型か！頼もしい！','空中戦を好むか！','支援型だな！','重装型の素質あり！'],
  ['鋼鉄の意志だ！','機動力重視か！','戦略家の素質あり！','頑強な精神だ！'],
  ['典型的なレンジャー装備！','プラズマ使いか！','制空権を握る男だ！','重機への情熱だ！'],
  ['仲間思いだ！','制空支援か！','完璧な包囲作戦だ！','最高の盾になれる！'],
  ['崇高な志だ！','飛行の才能あり！','戦略家の資質あり！','装備への憧れか！'],
];

const INTRO = [
  'よく来た新兵。\nこれよりEDF適正診断を行う。',
  '正直に答えれば、\nお前に最適な兵科が判明する。',
  '覚悟はいいか？\nでは始めよう！　EDF！',
];

const RESULTS = {
  ranger: { title:'レンジャー', en:'RANGER', color:'#5aaa5a',
    bg:'linear-gradient(160deg,#050e05,#0d2008)',  icon:'🪖',
    desc:'最も多くのEDF隊員を輩出する基本兵科。\n優れたバランス感覚と強靭な精神力を持つ。\n地球防衛の最前線を支える真のエリートだ。',
    speech:'貴官はレンジャー適正認定！地球の盾となれ！EDF！EDF！EDF！' },
  winger: { title:'ウイングダイバー', en:'WING DIVER', color:'#6a8aee',
    bg:'linear-gradient(160deg,#05050e,#0a0d28)', icon:'⚡',
    desc:'空中を高速で飛び回る精鋭飛行部隊。\nプラズマ兵器を駆使し敵の弱点を突く。\n機動力と火力を兼ね備えた空の戦士だ。',
    speech:'貴官はウイングダイバー適正認定！大空を駆け、敵を蹴散らせ！EDF！EDF！' },
  raider: { title:'エアレイダー', en:'AIR RAIDER', color:'#e0aa40',
    bg:'linear-gradient(160deg,#0e0a02,#201408)', icon:'📡',
    desc:'爆撃要請やビークル召喚を駆使する戦略家。\n戦場を俯瞰し最適な支援を行う頭脳派。\n「見えない力」で戦局を動かす影の司令官だ。',
    speech:'貴官はエアレイダー適正認定！最強の作戦で地球を救え！EDF！EDF！' },
  fencer: { title:'フェンサー', en:'FENCER', color:'#aa70ee',
    bg:'linear-gradient(160deg,#080410,#14082a)', icon:'⚙️',
    desc:'パワードスーツで超重装備を纏う最強の盾。\nどんな攻撃も受け止める鋼鉄の意志。\n圧倒的な防御力で仲間を守り抜く要塞兵だ。',
    speech:'貴官はフェンサー適正認定！重装甲で全てを薙ぎ払え！EDF！EDF！' },
};

// ===================== ゲーム =====================
let state = 'idle', introIdx = 0, qIdx = 0;
let scores = {ranger:0, winger:0, raider:0, fencer:0};
const $ = id => document.getElementById(id);

function speak(text, cb) {
  const s = window.speechSynthesis;
  if (!s) { cb?.(); return; }
  s.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.95; u.pitch = 0.85;
  u.onstart = () => charAnim.startTalk();
  u.onend   = () => { charAnim.stopTalk(); cb?.(); };
  u.onerror = () => { charAnim.stopTalk(); cb?.(); };
  s.speak(u);
}

function showBubble(t, tapHint = false) {
  $('speech-text').textContent = t;
  $('speech-tap-next').style.display = tapHint ? 'block' : 'none';
  $('speech-bubble').classList.add('show');
}
function hideBubble() { $('speech-bubble').classList.remove('show'); }

// アイドル時のみ身体タップで開始
function onCharacterTap() {
  if (state !== 'idle') return;
  state = 'intro'; introIdx = 0;
  $('tap-hint').style.display = 'none';
  showIntroLine();
}

// イントロ中は吹き出しタップで次へ
function onSpeechBubbleTap(e) {
  e.stopPropagation();
  if (state !== 'intro') return;
  window.speechSynthesis?.cancel();
  charAnim.stopTalk();
  introIdx++;
  introIdx >= INTRO.length ? startQuestions() : showIntroLine();
}

function showIntroLine() {
  showBubble(INTRO[introIdx], true);
  speak(INTRO[introIdx], () => {});
}

function startQuestions() {
  state = 'question'; hideBubble();
  qIdx = 0; scores = {ranger:0, winger:0, raider:0, fencer:0};
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[qIdx];
  $('q-num').textContent = qIdx + 1;
  $('q-bar-fill').style.width = (qIdx / QUESTIONS.length * 100) + '%';
  $('q-text').textContent = q.q;
  $('answers').innerHTML = '';
  q.a.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn'; btn.textContent = a.text;
    btn.onclick = () => selectAnswer(i);
    $('answers').appendChild(btn);
  });
  $('question-panel').removeAttribute('hidden');
  speak(q.q, () => {});
}

function selectAnswer(i) {
  if (state !== 'question') return;
  state = 'reaction';
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
  Object.entries(QUESTIONS[qIdx].a[i].s).forEach(([k,v]) => scores[k] += v);
  const react = REACTIONS[qIdx][i];
  $('question-panel').setAttribute('hidden', '');
  showBubble(react, false);
  speak(react, () => {
    hideBubble();
    qIdx++;
    qIdx >= QUESTIONS.length ? showCalculating() : (state = 'question', showQuestion());
  });
}

function showCalculating() {
  state = 'calculating';
  $('calculating').removeAttribute('hidden');
  speak('診断中だ…', () => {});
  setTimeout(showResult, 2500);
}

function showResult() {
  $('calculating').setAttribute('hidden', '');
  const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const r = RESULTS[best];
  $('result-panel').style.background = r.bg;
  $('result-icon').textContent = r.icon;
  $('result-class-en').textContent = r.en;
  $('result-class-jp').textContent = r.title;
  $('result-class-jp').style.color = r.color;
  $('result-desc').textContent = r.desc;
  $('result-panel').removeAttribute('hidden');
  state = 'result';
  charAnim.glow(true);
  setTimeout(() => speak(r.speech, () => charAnim.glow(false)), 700);
}

function restart() {
  window.speechSynthesis?.cancel();
  charAnim.stopTalk(); charAnim.glow(false);
  $('result-panel').setAttribute('hidden', '');
  hideBubble(); $('tap-hint').style.display = '';
  introIdx = 0; qIdx = 0; state = 'idle';
}
</script>
</body>
</html>
